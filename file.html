<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f7;
        color: #111;
      }

      .field {
        margin-bottom: 18px;
      }

      .field label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
      }

      .field input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
      }

      .field input:focus {
        border-color: #111;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        margin-bottom: 22px;
      }

      .row a {
        text-decoration: none;
        color: #444;
      }

      .row a:hover {
        text-decoration: underline;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .footer {
        text-align: center;
        font-size: 13px;
        margin-top: 18px;
        color: #666;
      }

      .footer a {
        color: #111;
        text-decoration: none;
        font-weight: 500;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Sign in</h2>
      <p>Enter your details to continue</p>

      <form>
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required />
        </div>

        <div class="row">
          <label><input type="checkbox" /> Remember</label>
          <a href="#">Forgot password?</a>
        </div>

        <button class="btn">Login</button>

        <div class="footer">No account? <a href="#">Sign up</a></div>
      </form>
    </div>
  </body>
</html>
